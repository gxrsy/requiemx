<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>requiemx — Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a1a; /* Dark gray background */
            color: #ffffff;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Simple Navigation */
        .dashboard-header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            text-decoration: none;
            color: #ffffff;
        }

        .btn-signout {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn-signout:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Fresh Container */
        .workspace {
            width: 100%;
            max-width: 800px;
            background: #242424; /* Slightly lighter dark-gray for the card */
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .welcome-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .welcome-subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <header class="dashboard-header">
        <a href="index.html" class="logo">requiemx</a>
        <button class="btn-signout" id="signOutBtn">Sign Out</button>
    </header>

    <main class="workspace">
        <h1 class="welcome-title">My Dashboard</h1>
        <p class="welcome-subtitle">Logged in as <span id="userDisplay">...</span></p>
    </main>

    <script>
        const SUPABASE_URL = "https://vhozskumzytvbidirism.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZob3pza3Vtenl0dmJpZGlyaXNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMjgwNjEsImV4cCI6MjA5OTYwNDA2MX0.1t82AH9lXFJ18kpNOcHHH_8Xo2mvD-BeHrPjFbO5EK4"; 

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const signOutBtn = document.getElementById('signOutBtn');
        const userDisplay = document.getElementById('userDisplay');

        // Verify Session
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = "index.html";
                return;
            }
            const cleanUsername = session.user.email.split('@')[0];
            userDisplay.innerText = cleanUsername;
        }

        checkSession();

        // Sign Out Event
        signOutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        });
    </script>

</body>
</html>
