<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>requiemx — Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a1a; /* Original Clean dark-gray */
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            position: relative;
            overflow: hidden;
            display: flex;
        }

        /* --- LEFT SIDE NAVIGATION (Original Style) --- */
        .left-menu {
            position: absolute;
            top: 30px;
            left: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            z-index: 100; /* Ensure nav stays on top */
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        .menu-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .account-header {
            font-size: 1.1rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .nav-link {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.2s ease;
            width: max-content;
            text-align: left;
            padding: 0;
            outline: none;
        }

        .nav-link:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        .nav-link.active {
            color: #ffffff;
        }


        /* --- CENTER WORKSPACE (Dynamic Content) --- */
        .main-workspace {
            margin-left: 240px;
            margin-top: 100px;
            padding: 40px;
            width: calc(100% - 240px);
            max-width: 900px;
            overflow-y: auto;
            height: calc(100vh - 100px);
            /* Hide scrollbar for cleaner look */
            scrollbar-width: thin;
            scrollbar-color: #444 #1a1a1a;
        }
        
        .main-workspace::-webkit-scrollbar { width: 6px; }
        .main-workspace::-webkit-scrollbar-track { background: transparent; }
        .main-workspace::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        /* View Containers */
        .view-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        .view-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- OVERVIEW VIEW (Original) --- */
        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
            letter-spacing: -0.2px;
        }

        .overview-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
        }

        .overview-card {
            background: #242424;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 120px;
        }

        .card-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
            text-transform: capitalize;
        }

        .card-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: #ffffff;
            margin-top: auto;
        }

        .card-subtext {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.35);
            margin-top: -4px;
        }


        /* --- CUSTOMIZE VIEW (New Guns.lol Style) --- */
        
        /* Asset Uploaders Row */
        .customize-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .upload-card {
            background: #242424;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .upload-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: rgba(255,255,255,0.6);
        }

        .upload-area {
            width: 100%;
            height: 140px;
            background: rgba(0,0,0,0.3);
            border: 2px dashed rgba(255,255,255,0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.2s;
        }

        .upload-area:hover {
            border-color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.02);
        }

        .upload-area img {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 2;
        }

        .upload-text {
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
            z-index: 1;
            pointer-events: none;
        }

        input[type="file"] { display: none; }

        /* Live Preview Container (The "Profile" Look) */
        .preview-container {
            background: #111; /* Darker base to show off bg image */
            border-radius: 20px;
            padding: 40px;
            position: relative;
            min-height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* The Dynamic Background Image */
        .preview-bg-image {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: background-image 0.5s ease;
        }

        /* Overlay to ensure text readability */
        .preview-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.45); 
            backdrop-filter: blur(2px);
            z-index: 2;
        }

        /* Profile Content Centered */
        .profile-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 350px;
        }

        .preview-avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: #333;
            border: 3px solid rgba(255,255,255,0.2);
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }

        .preview-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Default SVG Avatar Icon */
        .avatar-placeholder-svg {
            width: 100%; height: 100%;
            background: #2a2a2a;
            display: flex; align-items: center; justify-content: center;
            color: #555;
        }

        .preview-name {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            margin-bottom: 6px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }

        .preview-bio {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.4;
        }

        /* Mock Buttons in Preview */
        .mock-btn {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 10px;
            cursor: default;
            transition: 0.2s;
            text-align: center;
        }

        .mock-btn:hover {
            background: rgba(255,255,255,0.18);
            transform: translateY(-1px);
        }

        /* Settings Inputs below preview */
        .settings-row {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-label {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .text-input {
            background: #242424;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 12px;
            border-radius: 8px;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
        }

        .text-input:focus {
            border-color: rgba(255,255,255,0.3);
        }


        /* --- TOP & BOTTOM RIGHT CORNERS (Original) --- */
        .btn-signout {
            position: absolute;
            top: 30px;
            right: 40px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            z-index: 50;
        }

        .btn-signout:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .user-status {
            position: absolute;
            bottom: 30px;
            right: 40px;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            z-index: 50;
        }

        .user-status span {
            color: #ffffff;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <div class="left-menu">
        <a href="index.html" class="logo">requiemx</a>
        
        <div class="menu-group">
            <div class="account-header">Account</div>
            <button class="nav-link active" id="navOverview" onclick="switchView('overview')">Overview</button>
        </div>

        <div class="menu-group">
            <div class="account-header">Customise</div>
            <button class="nav-link" id="navCustomize" onclick="switchView('customize')">Profile</button>
        </div>
    </div>

    <!-- Main Workspace -->
    <main class="main-workspace">
        
        <!-- VIEW 1: OVERVIEW -->
        <div id="view-overview" class="view-section active">
            <h2 class="section-title">Account Overview</h2>
            
            <div class="overview-grid">
                <div class="overview-card">
                    <div class="card-label">Username</div>
                    <div class="card-value" id="cardUsername">...</div>
                    <div class="card-subtext">Change available now</div>
                </div>

                <div class="overview-card">
                    <div class="card-label">Alias</div>
                    <div class="card-value">0 aliases used</div>
                    <div class="card-subtext">1 alias slots remaining</div>
                </div>
            </div>
        </div>


        <!-- VIEW 2: CUSTOMIZE (Guns.lol Style) -->
        <div id="view-customize" class="view-section">
            <h2 class="section-title">Customise Profile</h2>

            <!-- Uploaders -->
            <div class="customize-grid">
                <!-- Background Uploader -->
                <div class="upload-card">
                    <div class="upload-label">Background Image</div>
                    <label for="bgInput" class="upload-area" id="bgUploadZone">
                        <span class="upload-text" id="bgText">Click to upload image</span>
                        <img id="bgThumb" src="" style="display:none;">
                    </label>
                    <input type="file" id="bgInput" accept="image/*">
                </div>

                <!-- Avatar Uploader -->
                <div class="upload-card">
                    <div class="upload-label">Profile Avatar</div>
                    <label for="avatarInput" class="upload-area" id="avatarUploadZone">
                        <span class="upload-text" id="avatarText">Click to upload avatar</span>
                        <img id="avatarThumb" src="" style="display:none;">
                    </label>
                    <input type="file" id="avatarInput" accept="image/*">
                </div>
            </div>

            <!-- Live Preview -->
            <div class="preview-container">
                <div class="preview-bg-image" id="liveBgImage"></div>
                <div class="preview-overlay"></div>

                <div class="profile-content">
                    <div class="preview-avatar" id="liveAvatarContainer">
                        <div class="avatar-placeholder-svg">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        </div>
                    </div>
                    
                    <div class="preview-name" id="liveName">username</div>
                    <div class="preview-bio" id="liveBio">custom bio goes here...</div>

                    <div class="mock-btn">Discord</div>
                    <div class="mock-btn">GitHub</div>
                    <div class="mock-btn">Spotify</div>
                </div>
            </div>

            <!-- Text Settings -->
            <div class="settings-row">
                <div class="input-group">
                    <label class="input-label">Display Name</label>
                    <input type="text" class="text-input" id="inputDisplayName" placeholder="Enter name..." oninput="updateTextPreview()">
                </div>
                <div class="input-group">
                    <label class="input-label">Bio / Description</label>
                    <input type="text" class="text-input" id="inputBioText" placeholder="Enter bio..." oninput="updateTextPreview()">
                </div>
            </div>

        </div>

    </main>
    
    <button class="btn-signout" id="signOutBtn">Sign Out</button>

    <div class="user-status">
        signed in as <span id="userDisplay">...</span>
    </div>

    <script>
        const SUPABASE_URL = "https://vhozskumzytvbidirism.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZob3pza3Vtenl0dmJpZGlyaXNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMjgwNjEsImV4cCI6MjA5OTYwNDA2MX0.1t82AH9lXFJ18kpNOcHHH_8Xo2mvD-BeHrPjFbO5EK4"; 

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // Elements
        const signOutBtn = document.getElementById('signOutBtn');
        const userDisplay = document.getElementById('userDisplay');
        const cardUsername = document.getElementById('cardUsername');
        
        // Nav
        const navOverview = document.getElementById('navOverview');
        const navCustomize = document.getElementById('navCustomize');

        // Views
        const viewOverview = document.getElementById('view-overview');
        const viewCustomize = document.getElementById('view-customize');

        // Inputs & Previews
        const bgInput = document.getElementById('bgInput');
        const avatarInput = document.getElementById('avatarInput');
        const liveBgImage = document.getElementById('liveBgImage');
        const liveAvatarContainer = document.getElementById('liveAvatarContainer');
        const inputDisplayName = document.getElementById('inputDisplayName');
        const inputBioText = document.getElementById('inputBioText');
        const liveName = document.getElementById('liveName');
        const liveBio = document.getElementById('liveBio');

        // Auth Check
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = "index.html";
                return;
            }
            const cleanUsername = session.user.email.split('@')[0];
            
            userDisplay.innerText = cleanUsername;
            cardUsername.innerText = cleanUsername;
            
            // Set defaults for customize view
            inputDisplayName.value = cleanUsername;
            liveName.innerText = cleanUsername;
        }

        checkSession();

        // Switch View Logic
        window.switchView = function(viewName) {
            // Hide all views
            viewOverview.classList.remove('active');
            viewCustomize.classList.remove('active');
            
            // Reset nav styles
            navOverview.classList.remove('active');
            navCustomize.classList.remove('active');

            // Activate selected
            if(viewName === 'overview') {
                viewOverview.classList.add('active');
                navOverview.classList.add('active');
            } else {
                viewCustomize.classList.add('active');
                navCustomize.classList.add('active');
            }
        };

        // Update Text Preview
        window.updateTextPreview = function() {
            liveName.innerText = inputDisplayName.value || 'username';
            liveBio.innerText = inputBioText.value || 'custom bio goes here...';
        };

        // Handle Background Upload
        bgInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    // Update Main Preview Background
                    liveBgImage.style.backgroundImage = `url(${e.target.result})`;
                    
                    // Update Thumbnail in uploader
                    const thumb = document.getElementById('bgThumb');
                    const text = document.getElementById('bgText');
                    thumb.src = e.target.result;
                    thumb.style.display = 'block';
                    text.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        // Handle Avatar Upload
        avatarInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    // Replace SVG placeholder with actual image
                    liveAvatarContainer.innerHTML = `<img src="${e.target.result}" alt="Avatar">`;
                    
                    // Update Thumbnail in uploader
                    const thumb = document.getElementById('avatarThumb');
                    const text = document.getElementById('avatarText');
                    thumb.src = e.target.result;
                    thumb.style.display = 'block';
                    text.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        // Sign Out
        signOutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        });
    </script>

</body>
</html>
