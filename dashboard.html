<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>requiemx — Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0c0d10; /* Pure deep slate/black background */
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            overflow: hidden;
        }

        /* --- SIDEBAR STYLE --- */
        .sidebar {
            width: 260px;
            background-color: #0f1115; /* Matching dark panel color */
            height: 100%;
            border-right: 1px solid rgba(0, 191, 255, 0.05);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            justify-content: space-between;
            overflow-y: auto;
            flex-shrink: 0;
        }

        /* Sidebar Logo Header */
        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff;
            text-decoration: none;
            margin-bottom: 20px;
            padding-left: 8px;
        }

        .sidebar-header span {
            color: #00bfff; /* Electric Blue Logo Icon accent */
        }

        /* Search Box styling matching the Ctrl+K layout */
        .search-container {
            position: relative;
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            background: #15181e;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 10px 12px 10px 36px;
            color: #ffffff;
            font-size: 0.85rem;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: rgba(0, 191, 255, 0.3);
            background: #171b22;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
            pointer-events: none;
        }

        .kb-shortcut {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            pointer-events: none;
        }

        /* Menu Groups */
        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-grow: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255, 255, 255, 0.7);
            padding: 12px 14px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 0.925rem;
            font-weight: 600;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.03);
            color: #ffffff;
        }

        /* Dropdown Group Styling */
        .nav-dropdown {
            background: rgba(0, 191, 255, 0.04);
            color: #00bfff;
            border: 1px solid rgba(0, 191, 255, 0.05);
        }

        .nav-dropdown-arrow {
            margin-left: auto;
            font-size: 0.7rem;
            color: #00bfff;
            transition: transform 0.2s;
        }

        .dropdown-submenu {
            display: flex;
            flex-direction: column;
            padding-left: 42px;
            margin-top: 4px;
            margin-bottom: 12px;
            gap: 8px;
        }

        .submenu-item {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .submenu-item:hover, .submenu-item.active {
            color: #00bfff;
        }

        /* Footer Container - Support Boxes & Share Buttons */
        .sidebar-footer {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: auto;
            padding-top: 20px;
        }

        /* Support Box panel */
        .support-box {
            background: #14171d;
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 16px;
        }

        .support-title {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .btn-support {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            background: rgba(0, 191, 255, 0.08);
            border: 1px solid rgba(0, 191, 255, 0.15);
            color: #00bfff;
            padding: 10px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.2s;
        }

        .btn-support:hover {
            background: rgba(0, 191, 255, 0.15);
            border-color: #00bfff;
        }

        .btn-mypage {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            background: rgba(0, 191, 255, 0.06);
            border: 1px solid rgba(0, 191, 255, 0.1);
            color: #ffffff;
            padding: 10px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-mypage:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Bottom pill-shaped share profile button */
        .btn-share {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: #00bfff;
            color: #000000;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-share:hover {
            background-color: #33ccff;
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.25);
        }


        /* --- REST OF PAGE LAYOUT --- */
        .main-content {
            flex-grow: 1;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Top Bar for original branding & actions */
        .top-navbar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 40px;
        }

        /* Top-Left Logo matching original request */
        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            text-decoration: none;
            color: #ffffff;
            letter-spacing: -0.5px;
        }

        /* Top-Right Sign Out Button */
        .btn-signout {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .btn-signout:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Bottom-Right User Indicator styling matching request */
        .user-status {
            position: absolute;
            bottom: 30px;
            right: 40px;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
        }

        .user-status span {
            color: #ffffff;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div>
            <a href="index.html" class="sidebar-header">
                <span>⚡</span> requiemx
            </a>

            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" placeholder="Search features..." readonly>
                <span class="kb-shortcut">Ctrl K</span>
            </div>

            <nav class="nav-menu">
                <div class="nav-item nav-dropdown">
                    <span>👤</span> Account
                    <span class="nav-dropdown-arrow">▼</span>
                </div>
                <div class="dropdown-submenu">
                    <a href="#" class="submenu-item active">Overview</a>
                    <a href="#" class="submenu-item">Analytics</a>
                    <a href="#" class="submenu-item">Badges</a>
                    <a href="#" class="submenu-item">Settings</a>
                </div>

                <a href="#" class="nav-item">
                    <span>✏️</span> Customize
                </a>
                <a href="#" class="nav-item">
                    <span>🔗</span> Links
                </a>
                <a href="#" class="nav-item">
                    <span>💎</span> Premium
                </a>
                <a href="#" class="nav-item">
                    <span>🖼️</span> Image Host
                </a>
                <a href="#" class="nav-item">
                    <span>📁</span> Templates
                </a>
            </nav>
        </div>

        <div class="sidebar-footer">
            <div class="support-box">
                <div class="support-title">Have a question or need support?</div>
                <a href="#" class="btn-support">💬 Help Center</a>
                <a href="#" class="btn-mypage">🔗 My Page</a>
            </div>
            
            <button class="btn-share">📢 Share Your Profile</button>
        </div>
    </aside>

    <div class="main-content">
        <header class="top-navbar">
            <a href="index.html" class="logo">requiemx</a>
            <button class="btn-signout" id="signOutBtn">Sign Out</button>
        </header>

        <div class="user-status">
            signed in as <span id="userDisplay">...</span>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://vhozskumzytvbidirism.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZob3pza3Vtenl0dmJpZGlyaXNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMjgwNjEsImV4cCI6MjA5OTYwNDA2MX0.1t82AH9lXFJ18kpNOcHHH_8Xo2mvD-BeHrPjFbO5EK4"; 

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const signOutBtn = document.getElementById('signOutBtn');
        const userDisplay = document.getElementById('userDisplay');

        // Verify Session
        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = "index.html";
                return;
            }
            const cleanUsername = session.user.email.split('@')[0];
            userDisplay.innerText = cleanUsername;
        }

        checkSession();

        // Sign Out Event
        signOutBtn.addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            window.location.href = "index.html";
        });
    </script>

</body>
</html>
