<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>utopium reseller</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0F0F0F;
            
            /* CSS Grid pattern */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center;
            
            /* Lock the screen height and hide scrollbars completely */
            height: 100vh; 
            overflow: hidden;
            position: relative;
            
            /* Flexbox to perfectly center everything in the viewport */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Fixed Black Top Bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #000000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
        }

        /* Centered Content Wrapper */
        .main-content {
            position: relative;
            z-index: 10;
            /* Pushes down slightly to account for the top bar height */
            margin-top: 60px; 
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 0 40px;
        }

        /* Centered Logo/Image Styling - Made significantly larger */
        .centered-image {
            max-width: 800px; /* Increased from 400px to 800px */
            max-height: 80vh; /* Allows it to occupy up to 80% of the screen height */
            width: 100%;       
            height: auto;
            display: block;
            user-select: none;
            -webkit-user-drag: none;
            object-fit: contain;
        }

        /* Starfield Container */
        #starfield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Twinkle Animation */
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            animation: twinkle ease-in-out infinite;
        }
    </style>
</head>
<body>

    <div class="top-bar"></div>

    <div class="main-content">
        <img class="centered-image" src="New Piskel.png" alt="Utopium Reseller Logo">
    </div>

    <div id="starfield"></div>

    <script>
        // Script to generate random, twinkling stars across the fixed screen area
        const starfield = document.getElementById('starfield');
        const numberOfStars = 40; 

        for (let i = 0; i < numberOfStars; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            
            const size = Math.random() * 2 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            
            star.style.top = `${Math.random() * 100}%`;
            star.style.left = `${Math.random() * 100}%`;
            
            star.style.animationDuration = `${Math.random() * 3 + 2}s`;
            star.style.animationDelay = `${Math.random() * 5}s`;
            
            starfield.appendChild(star);
        }
    </script>

</body>
</html>
