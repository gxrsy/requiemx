<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>utopium reseller</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0F0F0F;
            
            /* CSS Grid pattern */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center;
            
            /* Making the page tall enough to scroll up and down */
            min-height: 200vh; 
            position: relative;
            overflow-x: hidden;
            /* Extra padding at the top so content isn't hidden under the fixed top bar */
            padding-top: 60px; 
        }

        /* Fixed Black Top Bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background-color: #000000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000; /* Keeps it layered above the background and stars */
        }

        /* Starfield Container */
        #starfield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Twinkle Animation */
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            animation: twinkle ease-in-out infinite;
        }
    </style>
</head>
<body>

    <div class="top-bar"></div>

    <div id="starfield"></div>

    <script>
        // Script to generate random, twinkling stars across the scrollable height
        const starfield = document.getElementById('starfield');
        const numberOfStars = 60; 

        for (let i = 0; i < numberOfStars; i++) {
            const star = document.createElement('div');
            star.classList.add('star');
            
            // Randomize sizing (between 1px and 3px)
            const size = Math.random() * 2 + 1;
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            
            // Randomize positions across the entire scrollable document height
            star.style.top = `${Math.random() * 100}%`;
            star.style.left = `${Math.random() * 100}%`;
            
            // Randomize twinkle speed and delay
            star.style.animationDuration = `${Math.random() * 3 + 2}s`;
            star.style.animationDelay = `${Math.random() * 5}s`;
            
            starfield.appendChild(star);
        }
    </script>

</body>
</html>
