<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Math Face Scanner</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #121212;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            position: relative;
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
            aspect-ratio: 3/4;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        button {
            margin-top: 20px;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: bold;
            background-color: #ff3366;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
        #result {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #00ffcc;
        }
        .info {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <h1>Pure Math Face Scanner</h1>
    <div class="info">Stand in front of a plain, light wall. Hold still.</div>

    <div class="container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output"></canvas>
    </div>

    <button id="scanBtn">Scan & Calculate</button>
    <div id="result">Ready</div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        const scanBtn = document.getElementById('scanBtn');
        const resultDiv = document.getElementById('result');

        // Start local video
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => video.srcObject = stream);

        scanBtn.addEventListener('click', () => {
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            
            // Draw current camera frame to our canvas
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            const w = canvas.width;
            const h = canvas.height;

            resultDiv.innerText = "Processing pixels...";

            // --- Edge-Detection Algorithm (Sobel-style Contrast check) ---
            // We scan the image to find pixels where color changes drastically (the edge of your face)
            let leftJaw = null;
            let rightJaw = null;
            let chin = null;
            let leftCheek = null;
            let rightCheek = null;

            // Simple Grayscale Contrast Check function
            function getBrightness(x, y) {
                const idx = (y * w + x) * 4;
                return (data[idx] + data[idx+1] + data[idx+2]) / 3;
            }

            // 1. Scan Bottom-Up to find the Chin
            for (let y = h - 10; y > h / 2; y -= 2) {
                for (let x = Math.floor(w * 0.4); x < Math.floor(w * 0.6); x += 2) {
                    const diff = Math.abs(getBrightness(x, y) - getBrightness(x, y - 10));
                    if (diff > 25) { // Found high contrast edge
                        chin = {x, y};
                        break;
                    }
                }
                if (chin) break;
            }

            // 2. Scan Left-to-Right to find Left Cheek
            for (let x = 10; x < w / 2; x += 2) {
                for (let y = Math.floor(h * 0.4); y < Math.floor(h * 0.6); y += 2) {
                    const diff = Math.abs(getBrightness(x, y) - getBrightness(x + 10, y));
                    if (diff > 25) {
                        leftCheek = {x, y};
                        break;
                    }
                }
                if (leftCheek) break;
            }

            // 3. Scan Right-to-Left to find Right Cheek
            for (let x = w - 10; x > w / 2; x -= 2) {
                for (let y = Math.floor(h * 0.4); y < Math.floor(h * 0.6); y += 2) {
                    const diff = Math.abs(getBrightness(x, y) - getBrightness(x - 10, y));
                    if (diff > 25) {
                        rightCheek = {x, y};
                        break;
                    }
                }
                if (rightCheek) break;
            }

            // 4. Scan Left-to-Right lower down for Left Jaw
            for (let x = 10; x < w / 2; x += 2) {
                for (let y = Math.floor(h * 0.65); y < Math.floor(h * 0.75); y += 2) {
                    const diff = Math.abs(getBrightness(x, y) - getBrightness(x + 10, y));
                    if (diff > 25) {
                        leftJaw = {x, y};
                        break;
                    }
                }
                if (leftJaw) break;
            }

            // 5. Scan Right-to-Left lower down for Right Jaw
            for (let x = w - 10; x > w / 2; x -= 2) {
                for (let y = Math.floor(h * 0.65); y < Math.floor(h * 0.75); y += 2) {
                    const diff = Math.abs(getBrightness(x, y) - getBrightness(x - 10, y));
                    if (diff > 25) {
                        rightJaw = {x, y};
                        break;
                    }
                }
                if (rightJaw) break;
            }

            // --- Draw calculated dots on your screen ---
            ctx.fillStyle = "#ff0055";
            const points = [chin, leftCheek, rightCheek, leftJaw, rightJaw];
            points.forEach(pt => {
                if (pt) {
                    ctx.beginPath();
                    ctx.arc(pt.x, pt.y, 8, 0, 2 * Math.PI);
                    ctx.fill();
                }
            });

            // --- Calculate Shape based on Dot Spacing ---
            if (chin && leftCheek && rightCheek && leftJaw && rightJaw) {
                const cheekWidth = Math.abs(rightCheek.x - leftCheek.x);
                const jawWidth = Math.abs(rightJaw.x - leftJaw.x);
                const faceLength = Math.abs(chin.y - (leftCheek.y + rightCheek.y)/2);

                const lengthToWidthRatio = faceLength / cheekWidth;
                const jawToCheekRatio = jawWidth / cheekWidth;

                let shape = "Oval";
                if (lengthToWidthRatio > 1.35) {
                    shape = "Oblong / Rectangle";
                } else if (lengthToWidthRatio < 1.05) {
                    if (jawToCheekRatio > 0.88) {
                        shape = "Square";
                    } else {
                        shape = "Round";
                    }
                } else {
                    if (jawToCheekRatio > 0.9) {
                        shape = "Square";
                    } else if (jawToCheekRatio < 0.75) {
                        shape = "Heart Shape";
                    } else {
                        shape = "Oval";
                    }
                }

                resultDiv.innerHTML = `Detect Completed!<br>Shape: <span style="color:#ff3366">${shape}</span>`;
            } else {
                resultDiv.innerHTML = `<span style="color:#ffcc00">Could not find all face edges. Make sure your background is plain!</span>`;
            }
        });
    </script>
</body>
</html>
