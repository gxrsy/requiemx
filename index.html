<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>requiemx</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* Base Page Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121212; /* Sleek dark gray background */
            height: 100vh;
            width: 100vw;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Top Header */
        .header-nav {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            color: #ffffff;
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-decoration: none;
        }

        .btn-signin {
            color: #000000;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: 50px;
            background-color: #ffffff;
            transition: all 0.2s ease;
            display: inline-block;
            border: none;
            cursor: pointer;
        }

        .btn-signin:hover {
            background-color: #e5e5e5;
            transform: scale(1.02);
        }

        /* Bottom Center Claim Bar */
        .claim-container {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90%;
            max-width: 500px;
            z-index: 5;
            text-align: center;
        }

        .claim-box {
            display: flex;
            width: 100%;
            background: #18181c;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 8px 8px 8px 20px;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .claim-prefix {
            color: rgba(255, 255, 255, 0.35);
            font-weight: 600;
            font-size: 1.05rem;
            user-select: none;
            margin-right: 2px;
        }

        .claim-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ffffff;
            font-size: 1.05rem;
            font-weight: 600;
            padding: 10px 0;
        }

        .claim-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .btn-claim {
            background: #ffffff;
            color: #000000;
            border: none;
            outline: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-claim:hover {
            background-color: #e5e5e5;
            transform: translateY(-1px);
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;
        }

        /* Active class to show modal */
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Login/Signup Card */
        .login-card {
            background: #18181c;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 3.5rem 2.5rem 3rem 2.5rem;
            width: 90%;
            max-width: 440px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            position: relative;
        }

        .modal-overlay.active .login-card {
            transform: scale(1);
        }

        /* X Close Button in Top Right */
        .close-x-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            line-height: 1;
            padding: 4px;
        }

        .close-x-btn:hover {
            color: #ffffff;
            transform: scale(1.1);
        }

        .login-card h2 {
            color: #ffffff;
            margin-bottom: 0.75rem;
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .login-card p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        /* Input Fields */
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #242428;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            color: #ffffff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, background-color 0.2s;
        }

        .input-group input:focus {
            border-color: rgba(255, 255, 255, 0.2);
            background-color: #2a2a2e;
        }

        /* Hidden components by default */
        #confirmPasswordGroup {
            display: none;
        }

        /* Error/Status Messages */
        .error-msg {
            color: #ff4a4a;
            font-size: 0.85rem;
            text-align: left;
            margin-top: -0.75rem;
            margin-bottom: 1rem;
            display: none;
        }

        .success-msg {
            color: #4aff80;
            font-size: 0.85rem;
            text-align: left;
            margin-top: -0.75rem;
            margin-bottom: 1rem;
            display: none;
        }

        .success-msg a {
            color: #ffffff;
            text-decoration: underline;
            font-weight: bold;
        }

        /* Action Buttons */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            background-color: #e5e5e5;
        }

        .btn-submit:disabled {
            background-color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
        }

        /* Navigation Toggles */
        .toggle-container {
            margin-top: 1.75rem;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .toggle-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-weight: 700;
            cursor: pointer;
            text-decoration: underline;
            padding: 0;
            font-size: 0.9rem;
            margin-left: 4px;
        }
    </style>
</head>
<body>

    <header class="header-nav">
        <a href="#" class="logo">requiemx</a>
        <button class="btn-signin" id="openLogin">Sign In</button>
    </header>

    <div class="claim-container">
        <div class="claim-box">
            <span class="claim-prefix">requiemx.netlify.app/</span>
            <input type="text" class="claim-input" id="claimInput" placeholder="username" autocomplete="off" spellcheck="false">
            <button class="btn-claim" id="claimBtn">Claim</button>
        </div>
    </div>

    <div class="modal-overlay" id="loginModal">
        <div class="login-card" id="loginCard">
            <button class="close-x-btn" id="closeLogin" aria-label="Close modal">✕</button>

            <h2 id="modalTitle">Welcome Back</h2>
            <p id="modalSubtitle">Sign in to manage your profile</p>
            
            <form id="authForm" novalidate>
                <div class="input-group" id="usernameGroup">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="requiem_user" required autocomplete="username">
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <div class="input-group" id="confirmPasswordGroup">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password">
                </div>

                <div class="error-msg" id="errorMsgBox"></div>
                <div class="success-msg" id="successMsgBox"></div>

                <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>
            </form>

            <div class="toggle-container" id="toggleContainer">
                Don't have an account? <button class="toggle-btn" id="toggleMode">Sign up here</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://vhozskumzytvbidirism.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZob3pza3Vtenl0dmJpZGlyaXNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMjgwNjEsImV4cCI6MjA5OTYwNDA2MX0.1t82AH9lXFJ18kpNOcHHH_8Xo2mvD-BeHrPjFbO5EK4"; 

        // Initialize Supabase Client
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // UI Selectors
        const openBtn = document.getElementById('openLogin');
        const closeBtn = document.getElementById('closeLogin');
        const modal = document.getElementById('loginModal');
        const authForm = document.getElementById('authForm');
        
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const confirmPasswordGroup = document.getElementById('confirmPasswordGroup');
        const errorMsgBox = document.getElementById('errorMsgBox');
        const successMsgBox = document.getElementById('successMsgBox');

        const modalTitle = document.getElementById('modalTitle');
        const modalSubtitle = document.getElementById('modalSubtitle');
        const submitBtn = document.getElementById('submitBtn');
        const toggleContainer = document.getElementById('toggleContainer');

        const claimInput = document.getElementById('claimInput');
        const claimBtn = document.getElementById('claimBtn');

        let isSignUpMode = false;
        let currentUserSession = null;

        // Check if user has an existing logged-in session on page load
        async function checkInitialSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            currentUserSession = session;
            updateUIForSession(session);
        }

        function updateUIForSession(session) {
            if (session) {
                openBtn.innerText = "Dashboard";
            } else {
                openBtn.innerText = "Sign In";
            }
        }

        checkInitialSession();

        // Sign In / Dashboard button click handler
        openBtn.addEventListener('click', () => {
            if (currentUserSession) {
                // Manually go to dashboard on click
                window.location.href = "dashboard.html";
            } else {
                // If signed out, open login modal
                switchToMode(false);
                modal.classList.add('active');
            }
        });

        // Close Modal
        closeBtn.addEventListener('click', () => {
            modal.classList.remove('active');
            resetForm();
        });

        // Handle the landing page "Claim" bar button action
        claimBtn.addEventListener('click', () => {
            if (currentUserSession) {
                // If logged in, head straight to dashboard
                window.location.href = "dashboard.html";
                return;
            }

            const desiredUsername = claimInput.value.trim().toLowerCase();
            if (desiredUsername) {
                switchToMode(true); 
                usernameInput.value = desiredUsername;
                modal.classList.add('active');
                passwordInput.focus();
            } else {
                claimInput.focus();
            }
        });

        claimInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                claimBtn.click();
            }
        });

        // Clear errors and input fields
        function resetForm() {
            authForm.reset();
            errorMsgBox.style.display = "none";
            successMsgBox.style.display = "none";
            submitBtn.disabled = false;
        }

        // Toggle Functionality Between Login & Sign Up
        function switchToMode(toSignUp) {
            isSignUpMode = toSignUp;
            resetForm();

            if (isSignUpMode) {
                modalTitle.innerText = "Create Account";
                modalSubtitle.innerText = "Claim your profile link";
                submitBtn.innerText = "Sign Up";
                
                confirmPasswordGroup.style.display = "block";
                confirmPasswordInput.required = true;
                
                toggleContainer.innerHTML = `Already have an account? <button class="toggle-btn" id="toggleMode">Sign in here</button>`;
            } else {
                modalTitle.innerText = "Welcome Back";
                modalSubtitle.innerText = "Sign in to manage your profile";
                submitBtn.innerText = "Sign In";
                
                confirmPasswordGroup.style.display = "none";
                confirmPasswordInput.required = false;
                
                toggleContainer.innerHTML = `Don't have an account? <button class="toggle-btn" id="toggleMode">Sign up here</button>`;
            }
            setupToggleListener(); 
        }

        function setupToggleListener() {
            const toggleBtn = document.getElementById('toggleMode');
            if (toggleBtn) {
                toggleBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    switchToMode(!isSignUpMode);
                });
            }
        }

        setupToggleListener();

        // Database Auth Handling
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsgBox.style.display = "none";
            successMsgBox.style.display = "none";

            const username = usernameInput.value.trim().toLowerCase();
            const password = passwordInput.value;

            if (!username) {
                showError("Username is required.");
                return;
            }

            const virtualEmail = `${username}@requiemx.local`;

            if (isSignUpMode) {
                const confirmPassword = confirmPasswordInput.value;

                if (username.length < 3) {
                    showError("Username must be at least 3 characters.");
                    return;
                }
                if (password.length < 8) {
                    showError("Password must be at least 8 characters long.");
                    return;
                }
                if (!/[A-Z]/.test(password)) {
                    showError("Password must contain at least one uppercase letter.");
                    return;
                }
                if (!/[!@#$%^&*(),.?":{}|<>_]/.test(password)) {
                    showError("Password must contain a special character.");
                    return;
                }
                if (password !== confirmPassword) {
                    showError("Passwords do not match.");
                    return;
                }
            }

            submitBtn.disabled = true;

            if (isSignUpMode) {
                // --- CREATE ACCOUNT (SIGN UP) ---
                const { data, error } = await supabaseClient.auth.signUp({
                    email: virtualEmail,
                    password: password,
                    options: {
                        data: {
                            username: username
                        }
                    }
                });

                if (error) {
                    showError(error.message);
                    submitBtn.disabled = false;
                } else {
                    showSuccess(`Success! <a href="dashboard.html">Click here to go to your Dashboard</a>`);
                    submitBtn.disabled = false;
                }
            } else {
                // --- SIGN IN WITH USERNAME ---
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: virtualEmail,
                    password: password,
                });

                if (error) {
                    const cleanMessage = error.message.replace(virtualEmail, username);
                    showError(cleanMessage === "Invalid login credentials" ? "Invalid username or password." : cleanMessage);
                    submitBtn.disabled = false;
                } else {
                    showSuccess(`Logged in successfully! <a href="dashboard.html">Go to Dashboard</a>`);
                    submitBtn.disabled = false;
                }
            }
        });

        // Active session listener
        supabaseClient.auth.onAuthStateChange((event, session) => {
            currentUserSession = session;
            updateUIForSession(session);
        });

        function showError(message) {
            errorMsgBox.innerText = message;
            errorMsgBox.style.display = "block";
        }

        function showSuccess(messageHTML) {
            successMsgBox.innerHTML = messageHTML;
            successMsgBox.style.display = "block";
        }
    </script>

</body>
</html>
