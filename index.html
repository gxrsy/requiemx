<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Skin Outline Tracker</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #000;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 10px;
        }
        .container {
            position: relative;
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
            aspect-ratio: 3/4;
            border-radius: 12px;
            overflow: hidden;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror view */
        }
        #ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #00ff00;
            font-family: monospace;
            font-size: 11px;
            text-align: left;
            z-index: 10;
            pointer-events: none;
            background: rgba(0,0,0,0.6);
            padding: 5px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <h2 style="font-size: 1.2rem; margin: 10px 0 5px 0;">Pure Math Skin Outliner</h2>
    <p style="font-size: 0.8rem; color: #888; margin-bottom: 10px;">Calculates skin pixels using color formulas.</p>

    <div class="container">
        <div id="ui-overlay">FPS: --<br>Skin Pixels: --</div>
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="output"></canvas>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        const uiOverlay = document.getElementById('ui-overlay');

        let lastTime = 0;

        // Start Mobile Camera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                video.srcObject = stream;
                requestAnimationFrame(processFrame);
            });

        function processFrame(time) {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = 320; // Lower resolution for fast mobile processing
                canvas.height = 240;

                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imgData.data;
                const w = canvas.width;
                const h = canvas.height;

                // Create a secondary map to keep track of where skin is detected
                const skinMap = new Uint8Array(w * h);
                let skinPixelCount = 0;

                // 1. Math Formula for Skin Detection (YCbCr Rules)
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i+1];
                    const b = data[i+2];

                    // Convert RGB to YCbCr
                    const Y = 0.299 * r + 0.587 * g + 0.114 * b;
                    const Cb = 128 - 0.168736 * r - 0.331264 * g + 0.5 * b;
                    const Cr = 128 + 0.5 * r - 0.418688 * g - 0.081312 * b;

                    // Standard human skin color range criteria
                    if (Cr > 135 && Cr < 180 && Cb > 85 && Cb < 135 && Y > 80) {
                        skinMap[i / 4] = 1;
                        skinPixelCount++;
                    }
                }

                // Keep track of outermost skin boundary points
                let minX = w, maxX = 0, maxY = 0;
                let leftBound = null, rightBound = null, bottomBound = null;

                // 2. Draw Skin Outline
                ctx.strokeStyle = "#00ff00"; // Neon green outline
                ctx.lineWidth = 1.5;

                for (let y = 1; y < h - 1; y++) {
                    for (let x = 1; x < w - 1; x++) {
                        const idx = y * w + x;
                        
                        // If it's a skin pixel, check if it borders a non-skin pixel (an edge)
                        if (skinMap[idx] === 1) {
                            const isEdge = (
                                skinMap[idx - 1] === 0 || 
                                skinMap[idx + 1] === 0 || 
                                skinMap[idx - w] === 0 || 
                                skinMap[idx + w] === 0
                            );

                            if (isEdge) {
                                // Draw outline pixel
                                ctx.fillStyle = "#00ff00";
                                ctx.fillRect(x, y, 1.5, 1.5);

                                // Track boundary points for the dots
                                if (x < minX && y > h * 0.3) { minX = x; leftBound = {x, y}; }
                                if (x > maxX && y > h * 0.3) { maxX = x; rightBound = {x, y}; }
                                if (y > maxY && x > w * 0.3 && x < w * 0.7) { maxY = y; bottomBound = {x, y}; }
                            }
                        }
                    }
                }

                // 3. Draw Landmark Tracking Dots (Blue Dots)
                ctx.fillStyle = "#00ffff"; // Cyan tracking dots
                const landmarks = [leftBound, rightBound, bottomBound];
                landmarks.forEach(pt => {
                    if (pt) {
                        ctx.beginPath();
                        ctx.arc(pt.x, pt.y, 4, 0, 2 * Math.PI);
                        ctx.fill();
                    }
                });

                // Update UI performance tracker
                const fps = Math.round(1000 / (time - lastTime));
                lastTime = time;
                uiOverlay.innerHTML = `FPS: ${fps}<br>Skin Pixels: ${skinPixelCount}`;
            }
            requestAnimationFrame(processFrame);
        }
    </script>
</body>
</html>
