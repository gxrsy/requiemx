<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Fine Grid</title>
    <style>
        /* Reset default margins and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Base dark background */
        body {
            min-height: 100vh;
            background: linear-gradient(to bottom right, #0a1128, #000000);
            position: relative;
            overflow: hidden;
        }

        /* The Grid Layer - Now much smaller and tighter */
        .grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            /* Shrunk down from 40px to 15px for a smaller grid size */
            background-size: 15px 15px;
            pointer-events: none; 
            z-index: 2;
        }

        /* The Mouse Glow Effect */
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(10, 25, 70, 0.6) 0%, rgba(0, 0, 0, 0) 70%);
            top: 0;
            left: 0;
            transition: transform 0.1s ease-out;
            pointer-events: none;
            z-index: 1;
            transform: translate(-50%, -50%);
            will-change: transform;
        }
    </style>
</head>
<body>

    <div class="glow" id="glow"></div>
    <div class="grid"></div>

    <script>
        const glow = document.getElementById('glow');

        // Track mouse movement across the window
        window.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            // Move the glow element to the mouse position
            glow.style.transform = `translate(${x - 300}px, ${y - 300}px)`;
        });
    </script>

</body>
</html>
