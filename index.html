<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Midnight Gradient</title>
    <style>
        /* Reset default margins and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Deep, dark gradient from top-left to bottom-right */
        body {
            min-height: 100vh;
            background: linear-gradient(to bottom right, #0a1128, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: #e0e0e0; /* Slightly dimmed text to match the dark theme */
        }

        /* Subtle, translucent card content */
        .content {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        p {
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>Hello World</h1>
        <p>Your ultra-dark gradient website is ready.</p>
    </div>

</body>
</html>
