<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Interactive Grid</title>
    <style>
        /* Reset default margins and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Maximum darkness background */
        body {
            min-height: 100vh;
            background: linear-gradient(to bottom right, #030712, #000000);
            position: relative;
            overflow: hidden;
        }

        /* The Grid Layer - Increased opacity to 0.07 for a slight boost in visibility */
        .grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.07) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.07) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none; 
            z-index: 2;

            /* Mask pushes the grid away */
            mask-image: var(--mask);
            -webkit-mask-image: var(--mask);
        }

        /* The Mouse Glow Effect - Vibrant neon sapphire */
        .glow {
            position: absolute;
            width: 200px; 
            height: 200px; 
            background: radial-gradient(circle, rgba(0, 68, 255, 0.6) 0%, rgba(0, 0, 0, 0) 70%);
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
            margin-left: -100px;
            margin-top: -100px;
            will-change: left, top;
        }
    </style>
</head>
<body>

    <div class="glow" id="glow"></div>
    <div class="grid" id="grid"></div>

    <script>
        const glow = document.getElementById('glow');
        const grid = document.getElementById('grid');

        window.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            // Keeps the blue glow locked to the cursor
            glow.style.left = `${x}px`;
            glow.style.top = `${y}px`;

            // Pushes the grid away
            const maskCSS = `radial-gradient(circle 120px at ${x}px ${y}px, transparent 10%, black 70%)`;
            grid.style.maskImage = maskCSS;
            grid.style.webkitMaskImage = maskCSS;
        });
    </script>

</body>
</html>
