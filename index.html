<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warping Interactive Grid</title>
    <style>
        /* Reset default margins and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Maximum darkness background */
        body {
            min-height: 100vh;
            background: linear-gradient(to bottom right, #030712, #000000);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Center Tile Component - Made smaller and added structural padding */
        .center-tile {
            position: relative;
            width: 200px;
            height: 260px; 
            padding: 16px; /* Prevents the inner contents from touching the tile edges */
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 3; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        /* Image Wrapper occupying the top half of the padded inner area */
        .tile-image-container {
            width: 100%;
            height: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.2); 
            border-radius: 8px; /* Smooth rounded corners matching the container inset */
            overflow: hidden;
        }

        .tile-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }

        /* The Canvas completely handles drawing the animated grid */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: auto; 
        }

        /* The Mouse Glow Effect - Stable at 0.01 opacity */
        .glow {
            position: absolute;
            width: 200px; 
            height: 200px; 
            background: radial-gradient(circle, rgba(0, 68, 255, 0.01) 0%, rgba(0, 0, 0, 0) 70%);
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
            margin-left: -100px;
            margin-top: -100px;
            will-change: left, top;
        }
    </style>
</head>
<body>

    <div class="center-tile">
        <div class="tile-image-container">
            <img src="your-image.png" alt="Card Display Image">
        </div>
    </div>

    <div class="glow" id="glow"></div>
    <canvas id="gridCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        const glow = document.getElementById('glow');

        let mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
        const gridSpacing = 40;
        const pushRadius = 80;   
        const pushStrength = 2;  

        // Set glow initial position
        glow.style.left = `${mouse.x}px`;
        glow.style.top = `${mouse.y}px`;

        // Resize canvas to match screen size
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Listen for movement directly on the canvas element
        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.pageX;
            mouse.y = e.pageY;
            
            glow.style.left = `${mouse.x}px`;
            glow.style.top = `${mouse.y}px`;
        });

        // Animation loop that redraws the distorted lines frame by frame
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Set grid line styling back to 0.07 opacity
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.07)';
            ctx.lineWidth = 1;

            // Function to calculate the warped coordinates of a single grid intersection point
            function getDistortedPoint(gridX, gridY) {
                const dx = gridX - mouse.x;
                const dy = gridY - mouse.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < pushRadius && distance > 0) {
                    const force = (pushRadius - distance) / pushRadius;
                    const distortion = Math.pow(force, 2) * pushStrength; 
                    return {
                        x: gridX + (dx / distance) * distortion,
                        y: gridY + (dy / distance) * distortion
                    };
                }
                return { x: gridX, y: gridY };
            }

            // Draw horizontal lines
            for (let y = 0; y <= canvas.height; y += gridSpacing) {
                ctx.beginPath();
                for (let x = 0; x <= canvas.width + gridSpacing; x += 10) { 
                    const pt = getDistortedPoint(x, y);
                    if (x === 0) ctx.moveTo(pt.x, pt.y);
                    else ctx.lineTo(pt.x, pt.y);
                }
                ctx.stroke();
            }

            // Draw vertical lines
            for (let x = 0; x <= canvas.width; x += gridSpacing) {
                ctx.beginPath();
                for (let y = 0; y <= canvas.height + gridSpacing; y += 10) {
                    const pt = getDistortedPoint(x, y);
                    if (y === 0) ctx.moveTo(pt.x, pt.y);
                    else ctx.lineTo(pt.x, pt.y);
                }
                ctx.stroke();
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>

</body>
</html>
